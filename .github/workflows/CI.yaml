name: Monorepo CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  # -----------------------------------------------------
  # Detect which project changed
  # -----------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      python_changed: ${{ steps.filter.outputs.python }}
      dotnet_changed: ${{ steps.filter.outputs.dotnet }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - "Python/**"
            dotnet:
              - "Flock Placement API/**"

  # -----------------------------------------------------
  # Python CI Job
  # -----------------------------------------------------
  python-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.python_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r "Python/requirements.txt"

      - name: Run Python tests with coverage
        run: |
          pip install pytest pytest-cov
          pytest Python/tests --cov=Python --cov-report=xml:Python/coverage.xml

      - name: Upload Python coverage
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: Python/coverage.xml

  # -----------------------------------------------------
  # .NET CI Job
  # -----------------------------------------------------
  dotnet-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.dotnet_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore solution
        run: dotnet restore "./Flock Placement API/Flock Placement API.sln"

      - name: Run .NET tests with coverage
        run: |
          dotnet test "./Flock Placement API/Flock Placement API.sln" \
            --collect "XPlat Code Coverage" \
            --results-directory "./Flock Placement API/TestResults" \
            --configuration Release

      - name: Publish API
